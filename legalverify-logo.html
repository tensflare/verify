<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LegalVerify — Logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #3B6D11;
    --green-mid: #639922;
    --green-light: #EAF3DE;
    --text: #111110;
    --text-secondary: #888780;
    --text-tertiary: #B4B2A9;
    --border: rgba(0,0,0,0.12);
    --bg: #F8F7F4;
    --surface: #FFFFFF;
    --font-sans: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    padding: 48px 24px;
  }

  .label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 24px;
    user-select: none;
  }

  .logo-icon { flex-shrink: 0; }

  .logo-text {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .logo-wordmark {
    font-family: var(--font-sans);
    font-size: 36px;
    font-weight: 500;
    letter-spacing: -1.5px;
    line-height: 1;
    color: var(--text);
  }

  .logo-wordmark span { color: var(--green); }

  .logo-tagline {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 2.5px;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .on-white {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 32px 40px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .on-dark {
    background: #111110;
    border-radius: 12px;
    padding: 32px 40px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .on-dark .logo-wordmark { color: #F8F7F4; }
  .on-dark .logo-wordmark span { color: #97C459; }
  .on-dark .logo-tagline { color: #5F5E5A; }

  .variant {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  hr {
    width: 100%;
    max-width: 720px;
    border: none;
    border-top: 0.5px solid var(--border);
  }
</style>
</head>
<body>

<!-- Primary on white -->
<div class="variant">
  <p class="label">Primary — on white</p>
  <div class="on-white">
    <div class="logo">
      <div class="logo-icon">
        <svg width="72" height="72" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Outer dashed ring -->
          <circle cx="70" cy="70" r="62" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
          <!-- Inner solid ring -->
          <circle cx="70" cy="70" r="38" stroke="#111110" stroke-width="2.5"/>
          <!-- Crosshair arms -->
          <line x1="4"  y1="70" x2="32" y2="70" stroke="#111110" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="108" y1="70" x2="136" y2="70" stroke="#111110" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="70" y1="4"  x2="70" y2="32" stroke="#111110" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="70" y1="108" x2="70" y2="136" stroke="#111110" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Corner brackets -->
          <polyline points="20,20 36,20 36,36" fill="none" stroke="#3B6D11" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="120,20 104,20 104,36" fill="none" stroke="#3B6D11" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="20,120 36,120 36,104" fill="none" stroke="#3B6D11" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="120,120 104,120 104,104" fill="none" stroke="#3B6D11" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- Citation text -->
          <text x="70" y="64" font-family="'DM Mono', monospace" font-size="10" fill="#3B6D11" text-anchor="middle" letter-spacing="0.5">410 U.S.</text>
          <text x="70" y="76" font-family="'DM Mono', monospace" font-size="10" fill="#3B6D11" text-anchor="middle" letter-spacing="0.5">113 (1973)</text>
          <!-- Verified tick -->
          <polyline points="62,86 67,92 79,80" fill="none" stroke="#3B6D11" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <div class="logo-wordmark">Legal<span>Verify</span></div>
        <div class="logo-tagline">Citation Verification for the AI Era</div>
      </div>
    </div>
  </div>
</div>

<hr>

<!-- Primary on dark -->
<div class="variant">

          <polyline points="120,20 104,20 104,36" fill="none" stroke="#97C459" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="20,120 36,120 36,104" fill="none" stroke="#97C459" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="120,120 104,120 104,104" fill="none" stroke="#97C459" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="70" y="64" font-family="'DM Mono', monospace" font-size="10" fill="#97C459" text-anchor="middle" letter-spacing="0.5">410 U.S.</text>
          <text x="70" y="76" font-family="'DM Mono', monospace" font-size="10" fill="#97C459" text-anchor="middle" letter-spacing="0.5">113 (1973)</text>
          <polyline points="62,86 67,92 79,80" fill="none" stroke="#97C459" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <div class="logo-wordmark">Legal<span>Verify</span></div>
        <div class="logo-tagline">Citation Verification for the AI Era</div>
      </div>
    </div>
  </div>
</div>

<hr>

</body>
</html>
